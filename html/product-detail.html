<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lib.js"></script>
</head>
<body>
    <div class="container mt-4">
        <nav>
            <a href="../index.html" class="text-decoration-none">Trang chủ</a> / <span>Chi tiết sản phẩm</span>
        </nav>

        <hr> <div class="row mt-4">
            <div class="col-md-5">
                <img src="https://placeholder.com" id="img-detail" class="img-fluid border" alt="Ảnh sản phẩm">
            </div>

            <div class="col-md-7">
                <h2 id="name-detail" class="fw-bold">Tên sản phẩm</h2>
                <h4 id="price-detail" class="text-danger my-3">Giá: 0đ</h4>
                
                <p class="fw-bold mb-1">Mô tả sản phẩm:</p>
                <p id="desc-detail" class="text-secondary" style="text-align: justify;">
                    Nội dung mô tả sẽ hiển thị tại đây...
                </p>

                <button class="btn btn-primary mt-3">Thêm vào giỏ hàng</button>
            </div>
        </div>
    </div>

    <script>
        // 2. Sử dụng URLSearchParams để lấy ID từ thanh địa chỉ (URL)
        const queryString = window.location.search;
        const urlParams = new URLSearchParams(queryString);
        const productId = urlParams.get('id'); // Kết quả: "01" hoặc "02"...

        // 3. Tìm sản phẩm trong mảng dựa trên ID vừa lấy được
        const product = productList.find(item => item.id === productId);

        // 4. Nếu tìm thấy sản phẩm thì đổ dữ liệu ra HTML
        if (product) {
            document.getElementById('name-detail').innerText = product.name;
            document.getElementById('price-detail').innerText = "Giá: " + product.price + "đ/túi";
            document.getElementById('desc-detail').innerText = product.desc;
            document.getElementById('img-detail').src = product.image;
        } else {
            // Trường hợp ID không tồn tại hoặc không tìm thấy
            document.body.innerHTML = "<div class='container mt-5'><h3>Không tìm thấy sản phẩm này!</h3><a href='../index.html'>Quay lại trang chủ</a></div>";
        }
    </script>
</body>
</html>
