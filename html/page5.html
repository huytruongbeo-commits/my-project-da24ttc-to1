<!DOCTYPE html>
<html lang="vi">
    <head>
        <title>thiết kế form đăng nhập</title>
        <meta charset="utf-8">
         <link rel="stylesheet" href="../css/style5.css">
    </head>
    <body>
        <div class ="container">
            <form id="frminBangCC">
                 <h>bảng cửu chương</h>
                 <label for="number">nhập số</label>
                 <input type="text" id="number" placeholder="nhập số">
                 <button type="button" onclick="inBang()">In</button>
            </form>  
            <div id="kq"></div>
        </div>
        <script>
           function inBang() {
                let kq = "";
                for(let i = 1; i <= 10; i++) {
                    kq += "5 X " + i + " = " + (5 * i) + "<br>";
                }
         
                document.getElementById("kq").innerHTML = kq;
            }
        </script>
    </body>
</html>
