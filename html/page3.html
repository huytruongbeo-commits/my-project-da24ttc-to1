<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Đăng ký câu lạc bộ GIT</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="../CSS/style3.css">
</head>
<body>
    <div class="container">
        <form id="frmSign">
            <h3>Đăng ký tài khoản </h3>
            <div class="hh">
                <label for="hovaten">Họ và tên:</label>
                <input class="kk" type="text" id="hovaten" placeholder="Nhập họ và tên của bạn">
            </div>

            <div class="hh">
                <label for="mssv">Mã sinh viên:</label>
                <input class="kk" type="text" id="mssv" placeholder="Nhập mã sinh viên">
            </div>

            <div class="hh">
                <label for="lop">Lớp:</label>
              <input class="kk" type="text" id="lop" placeholder="Nhập tên lớp">
            </div>
            

            <div class="gioitinh">
                <label for="gioitinh"><b>Giới tính:</b></label>
                <div class="radio-wrapper">
                    <input type="radio" id="nam" name="gioitinh" value="nam">
                    <label for="nam">Nam</label>
                    <input type="radio" id="nu" name="gioitinh" value="nu">
                    <label for="nu">Nữ</label>
                </div>
            </div>

            <div class="hh">
                <label for="ngaysinh">Ngày sinh:</label>
                <input class="kk"type="date" id="ngaysinh">
            </div>

            
            <div class="hh">
                <label for="sdt">Số điện thoại & Địa chỉ:</label>
                <div class="row-inner">
                    <input class="kk"type="text" id="sdt" placeholder="Số điện thoại">
                   
                </div>
            </div>

            <div class="hh">
                <label for="email">Email:</label>
                <input class="kk" type="email" id="email" placeholder="Nhập email của bạn" placeholder="Nhập email của bạn">
            </div>
            <button type="submit" class="tiptuc">Tiếp tục</button>
        </div>
        
    </div>
</body>
</html>
